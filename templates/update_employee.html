<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Edit Employee</h1>

    <form action="/edit-employee/{{ employee.id }}" method="post">

        <label>Name</label><br>
        <input type="text" name="name" value="{{ employee.name }}" required>
        <br><br>

        <label>Age</label><br>
        <input type="number" name="age" value="{{ employee.age }}" required>
        <br><br>

        <label>Department</label><br>
        <input type="text" name="department" value="{{ employee.department }}" required>
        <br><br>

        <label>Salary</label><br>
        <input type="number" name="salary" value="{{ employee.salary }}" required>
        <br><br>

        <button type="submit">Update Employee</button>

    </form>

    <br>

    <a href="/view-employees">
        <button>Cancel</button>
    </a>

</div>

</body>
</html>
