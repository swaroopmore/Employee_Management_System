<!-- register.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#dbeafe,#f8fafc);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }
        .container{
            background:white;
            padding:35px;
            width:380px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
            text-align:center;
        }
        h1{color:#0A66C2;}
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:12px;
            background:#0A66C2;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{background:#084d94;}
        .link-btn{
            display:block;
            margin-top:15px;
            text-decoration:none;
            color:#0A66C2;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏢 Employee Management System</h1>
    <h2>Create Account</h2>

    <form action="/register" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <a href="/login" class="link-btn">Already have an account? Login</a>
</div>

</body>
</html>
