<!-- login.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#dbeafe,#f8fafc);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }
        .container{
            background:white;
            width:360px;
            padding:35px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
            text-align:center;
        }
        h1{color:#0A66C2;}
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:12px;
            background:#198754;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{background:#146c43;}
        .link-btn{
            display:block;
            margin-top:15px;
            color:#0A66C2;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 Login</h1>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <a href="/" class="link-btn">Create New Account</a>
</div>

</body>
</html>
