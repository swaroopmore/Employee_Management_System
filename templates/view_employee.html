<!DOCTYPE html>
<html>
<head>
    <title>View Employees</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#dbeafe,#f8fafc);
            margin:0;
            padding:30px;
        }

        .container{
            max-width:1100px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0A66C2;
            margin-bottom:25px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:10px;
        }

        th{
            background:#0A66C2;
            color:white;
            padding:15px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f8f9fa;
        }

        tr:hover{
            background:#eef6ff;
            transition:0.3s;
        }

        .btn{
            display:inline-block;
            padding:8px 16px;
            border:none;
            border-radius:8px;
            text-decoration:none;
            color:white;
            cursor:pointer;
            font-size:14px;
            transition:0.3s;
            margin:2px;
        }

        .edit-btn{
            background:#0A66C2;
        }

        .edit-btn:hover{
            background:#084d94;
        }

        .delete-btn{
            background:#dc3545;
        }

        .delete-btn:hover{
            background:#b02a37;
        }

        .add-btn{
            background:#198754;
        }

        .add-btn:hover{
            background:#146c43;
        }

        .dashboard-btn{
            background:#6c757d;
        }

        .dashboard-btn:hover{
            background:#565e64;
        }

        .bottom-buttons{
            margin-top:25px;
            display:flex;
            justify-content:center;
            gap:15px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>👨‍💼 Employee Management System</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Actions</th>
        </tr>

        {% for emp in employees %}
        <tr>
            <td>{{ emp.id }}</td>
            <td>{{ emp.name }}</td>
            <td>{{ emp.age }}</td>
            <td>{{ emp.department }}</td>
            <td>₹ {{ emp.salary }}</td>

            <td>
                <a href="/edit-employee/{{ emp.id }}">
                    <button class="btn edit-btn">✏️ Edit</button>
                </a>

                <a href="/delete-employee/{{ emp.id }}"
                   onclick="return confirm('Are you sure you want to delete this employee?')">
                    <button class="btn delete-btn">🗑 Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

    <div class="bottom-buttons">

        <a href="/add-employee">
            <button class="btn add-btn">➕ Add Employee</button>
        </a>

        <a href="/dashboard">
            <button class="btn dashboard-btn">🏠 Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
